<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmet Ulu</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#111110;--surface:#1a1a18;--border:#2a2a27;--text:#e8e6e1;--muted:#6b6b65;--soft:#9b9991;--accent:#d4a574;--line:#2e2e2b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-weight:300;line-height:1.7;font-size:15px;min-height:100vh;}
nav{position:fixed;top:0;right:0;left:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:22px 40px;background:rgba(17,17,16,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);}
.nav-logo{font-family:'Lora',serif;font-size:16px;color:var(--text);cursor:pointer;border:none;background:none;font-weight:400;}
.nav-links{display:flex;gap:24px;list-style:none;}
.nav-links button{background:none;border:none;font-family:'Inter',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;transition:color 0.2s;padding:0;font-weight:300;}
.nav-links button:hover{color:var(--text);}
.nav-links button.active{color:var(--accent);}
.page{display:none;min-height:100vh;padding:0 40px;max-width:700px;margin:0 auto;flex-direction:column;}
.page.active{display:flex;}
#page-home{padding-top:120px;padding-bottom:60px;justify-content:center;}
.home-label{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:28px;opacity:0;transition:opacity 0.6s ease;}
.home-title{font-family:'Lora',serif;font-size:clamp(36px,6vw,56px);font-weight:400;line-height:1.2;letter-spacing:-0.5px;margin-bottom:28px;min-height:140px;}
.tline{display:block;}
.cursor-blink{display:inline-block;width:2px;height:0.85em;background:var(--accent);margin-left:3px;vertical-align:middle;animation:blink 1s step-end infinite;}
@keyframes blink{50%{opacity:0;}}
.home-desc{font-size:16px;color:var(--soft);max-width:460px;line-height:1.8;opacity:0;transform:translateY(10px);transition:opacity 0.6s ease,transform 0.6s ease;}
.home-desc.show{opacity:1;transform:translateY(0);}
.home-cta{display:flex;gap:12px;margin-top:32px;flex-wrap:wrap;opacity:0;transform:translateY(10px);transition:opacity 0.6s ease 0.15s,transform 0.6s ease 0.15s;}
.home-cta.show{opacity:1;transform:translateY(0);}
.btn{font-size:13px;padding:10px 22px;border-radius:100px;cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif;font-weight:400;border:none;}
.btn-primary{background:var(--accent);color:#111;}
.btn-primary:hover{background:#e0b585;}
.btn-ghost{background:var(--surface);color:var(--soft);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.inner-page{padding-top:110px;padding-bottom:80px;justify-content:flex-start;}
.page-header{margin-bottom:48px;}
.page-header h2{font-family:'Lora',serif;font-size:clamp(28px,4vw,40px);font-weight:400;letter-spacing:-0.5px;margin-bottom:8px;}
.page-header p{font-size:14px;color:var(--muted);}
.about-text{font-size:15px;color:var(--soft);line-height:1.85;max-width:540px;}
.about-text+.about-text{margin-top:16px;}
.about-text strong{color:var(--text);font-weight:500;}
.skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:36px;}
.skill-group{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px 18px;transition:border-color 0.2s;}
.skill-group:hover{border-color:var(--accent);}
.skill-group-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px;}
.skill-tags{display:flex;flex-wrap:wrap;gap:6px;}
.stag{font-size:12px;padding:3px 10px;border-radius:100px;background:var(--bg);color:var(--soft);border:1px solid var(--line);}
.timeline{position:relative;padding-left:20px;border-left:1px solid var(--line);}
.timeline-item{position:relative;padding-bottom:36px;padding-left:24px;}
.timeline-item:last-child{padding-bottom:0;}
.timeline-item::before{content:'';position:absolute;left:-25px;top:7px;width:7px;height:7px;border-radius:50%;background:var(--border);border:1.5px solid var(--muted);transition:all 0.2s;}
.timeline-item:hover::before{border-color:var(--accent);background:var(--accent);}
.item-meta{font-size:11px;color:var(--muted);margin-bottom:5px;}
.item-title{font-size:16px;font-weight:500;color:var(--text);margin-bottom:7px;}
.item-desc{font-size:14px;color:var(--soft);line-height:1.65;}
.item-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.tag{font-size:11px;padding:2px 9px;border-radius:100px;background:var(--surface);color:var(--muted);border:1px solid var(--border);}
.item-link{display:inline-block;margin-top:10px;font-size:12px;color:var(--muted);text-decoration:none;transition:color 0.2s;}
.item-link:hover{color:var(--accent);}
.edu-list{display:flex;flex-direction:column;}
.edu-item{display:flex;gap:20px;padding:22px 0;border-bottom:1px solid var(--line);}
.edu-item:first-child{border-top:1px solid var(--line);}
.edu-icon{width:42px;height:42px;border-radius:8px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.edu-title{font-size:15px;font-weight:500;color:var(--text);margin-bottom:4px;}
.edu-sub{font-size:13px;color:var(--soft);margin-bottom:4px;}
.edu-date{font-size:12px;color:var(--muted);}
.edu-badge{display:inline-block;margin-top:8px;font-size:11px;padding:3px 10px;border-radius:100px;background:rgba(212,165,116,0.1);color:var(--accent);border:1px solid rgba(212,165,116,0.25);}
.yazi-kategori{margin-bottom:40px;}
.yazi-kategori-baslik{font-family:'Lora',serif;font-size:20px;font-weight:400;color:var(--text);margin-bottom:4px;}
.yazi-kategori-desc{font-size:13px;color:var(--muted);margin-bottom:16px;}
.yazi-item{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:8px;cursor:pointer;transition:all 0.2s;text-decoration:none;}
.yazi-item:hover{border-color:var(--accent);padding-left:20px;}
.yazi-item:hover .yazi-item-title{color:var(--accent);}
.yazi-item-title{font-size:14px;color:var(--text);transition:color 0.2s;}
.yazi-item-meta{font-size:12px;color:var(--muted);white-space:nowrap;}
.yazi-item-arrow{font-size:14px;color:var(--muted);margin-left:12px;}
.contact-intro{font-size:15px;color:var(--soft);line-height:1.8;max-width:440px;margin-bottom:32px;}
.contact-links{display:flex;flex-direction:column;margin-bottom:40px;}
.contact-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--line);text-decoration:none;color:var(--soft);font-size:14px;transition:color 0.2s,padding-left 0.2s;}
.contact-row:first-child{border-top:1px solid var(--line);}
.contact-row:hover{color:var(--accent);padding-left:6px;}
.contact-icon{width:20px;text-align:center;}
.contact-label{color:var(--muted);font-size:12px;min-width:64px;}
.contact-form{display:flex;flex-direction:column;gap:14px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;}
.form-group input,.form-group textarea{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:12px 14px;font-family:'Inter',sans-serif;font-size:14px;font-weight:300;outline:none;border-radius:4px;transition:border-color 0.2s;resize:none;}
.form-group input:focus,.form-group textarea:focus{border-color:var(--accent);}
.form-group input::placeholder,.form-group textarea::placeholder{color:var(--muted);}
.page-footer{margin-top:56px;padding-top:22px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);}
</style>
</head>
<body>

<nav>
<button class="nav-logo" onclick="showPage('home')">Ahmet Ulu</button>
<ul class="nav-links">
<li><button onclick="showPage('hakkimda')">Hakkımda</button></li>
<li><button onclick="showPage('egitim')">Eğitim</button></li>
<li><button onclick="showPage('projeler')">Projeler</button></li>
<li><button onclick="showPage('yazilar')">Yazılar</button></li>
<li><button onclick="showPage('iletisim')">İletişim</button></li>
</ul>
</nav>

<div id="page-home" class="page active">
<div class="home-label">Kayseri, Türkiye</div>
<h1 class="home-title">Merhaba, ben Ahmet Ulu.</h1>
<p class="home-desc">
Gömülü sistemler, otomasyon ve makine öğrenmesi üzerine çalışıyorum.
Raspberry Pi'den STM32'ye, Python'dan C++'a, donanım ve yazılımın kesiştiği yerde üretiyorum.
</p>
</div>

</body>
</html>
